    <style>
      /* Use dvh (dynamic viewport height) — shrinks when keyboard appears */
      html {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #0d1117;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #0d1117;

        /* Prevent iOS bounce scroll */
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;

        /* Prevent text selection flash on touch */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      /* Block back navigation gestures at CSS level */
      #root {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;

        /* Prevent swipe-to-navigate on mobile browsers */
        overscroll-behavior-y: contain;
        overscroll-behavior-x: contain;
        touch-action: manipulation;
      }
    </style>
